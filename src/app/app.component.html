@if (!portfolioData.loaded() && portfolioData.loading()) {
  <main class="app-loading-shell" aria-busy="true" aria-live="polite">
    <section class="app-loading surface-card glow-ring">
      <div class="app-loading__brand">
        <span class="app-loading__icon">
          <app-icon name="AI" />
        </span>
        <div>
          <p class="app-loading__eyebrow">Naren Edpuganti</p>
          <h1>Loading portfolio workspace</h1>
        </div>
      </div>

      <p class="app-loading__copy">Preparing projects, experience, and conversation context for your walkthrough.</p>

      <div class="app-loading__bar" aria-hidden="true">
        <span></span>
      </div>
    </section>
  </main>
} @else {
  <router-outlet />
}
