<article class="timeline-item surface-card">
  <div class="timeline-item__line"></div>

  <div class="timeline-item__content">
    <div class="timeline-item__header">
      <span class="eyebrow">{{ item().duration }}</span>
      <span class="timeline-item__location">{{ item().location }}</span>
    </div>

    <h3>{{ item().role }}</h3>
    <p class="timeline-item__company">{{ item().company }}</p>
    <p class="timeline-item__summary">{{ item().summary }}</p>

    <ul class="timeline-item__bullets">
      @for (bullet of item().bullets; track bullet) {
        <li>{{ bullet }}</li>
      }
    </ul>

    <div class="timeline-item__stack">
      @for (technology of item().technologies; track technology) {
        <span>{{ technology }}</span>
      }
    </div>
  </div>
</article>
