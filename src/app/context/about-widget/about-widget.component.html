<section class="widget surface-card">
  <h3>{{ widget().title }}</h3>
  @if (widget().profile; as profile) {
    <app-avatar-badge [profile]="profile" [compact]="true" />

    <div class="widget__links">
      @for (link of profile.socialLinks; track link.url) {
        <a [href]="link.url" target="_blank" rel="noreferrer">
          <span class="icon-pill"><app-icon [name]="link.iconLabel" /></span>
          {{ link.label }}
        </a>
      }
    </div>
  }
</section>
